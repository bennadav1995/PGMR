window.addEventListener('resize', resize);

// ── STATE ─────────────────────────────────────────────────────
let mode = 0, paused = false, playTime = 0, dataIdx = 0, lastT = null, speed = 1;

// Shared device state
const active    = {};  // name -> {rssi, sID, ts, devCount}
const barAnim   = {};  // name -> {rssi, norm, currentH, targetH, lastSeen} for mode 3
const matData   = {};  // name -> {2:{rssi,ts}, 3:.., 4:.., 5:.., lastSeen} for mode 2
const binCols   = {};  // name -> {chars, offset, speed} for mode 4
const tActive   = {};  // name -> {rssi, ts} for tower

// Name hue for waveform
const ALL_NAMES = [...new Set(RAW.map(d => d[2]))];
const NAME_HUE  = {};
ALL_NAMES.forEach((n,i) => { NAME_HUE[n] = i / ALL_NAMES.length; });

function getPos(name) {
  if (POS[name]) return POS[name];
  const h = NAME_HUE[name] || 0.5;
  return [0.1 + h*0.8, 0.1 + (1-h)*0.8];
}


// ── HUMAN DEVICE DETECTION ────────────────────────────────────
// Infrastructure/routers/printers = NOT human
const INFRA_PATTERNS = [
  'ESP','HOT','DIRECT','WIFIBRG','BezeqEXT','Cudy','CyberLink',
  'Riko','Limor','Triple C','Opal','moti','c6553','HOTbox',
  'WIFIBRG','IPC','Redmi'
];
function isHuman(name) {
  const up = name.toUpperCase();
  for (const p of INFRA_PATTERNS) {
    if (up.includes(p.toUpperCase())) return false;
  }
  return true; // personal name = human
}

// ── CLOSEST PERSON ────────────────────────────────────────────
function getClosestHuman() {
  let best = null, bestRssi = -Infinity;
  Object.entries(active).forEach(([name, d]) => {
    if (!isHuman(name)) return;
    if (playTime - d.ts > 4000) return;
    if (d.rssi > bestRssi) { bestRssi = d.rssi; best = name; }
  });
  return best;
}

// ── SIGNAL HANDLER ────────────────────────────────────────────
function onSignal(e) {
  const [ts, sID, name, rssi, devCount] = e;
  const norm = Math.max(0, Math.min(1, (-rssi-50)/50));
  const now  = playTime;

  // shared active
  active[name] = {rssi, sID, ts:now, devCount};

  // mode 2 — matrix
  if (!matData[name]) matData[name] = {lastSeen:0};
  matData[name][sID] = {rssi, ts:now, display:rssi};
  matData[name].lastSeen = now;

  // mode 3 — barcode animated
  if (!barAnim[name]) barAnim[name] = {rssi, norm, currentH:0, targetH:0, lastSeen:0};
  barAnim[name].rssi     = rssi;
  barAnim[name].norm     = norm;
  barAnim[name].targetH  = H*0.08 + H*0.78*norm;
  barAnim[name].lastSeen = now;

  // mode 4 — binary
  if (!binCols[name]) binCols[name] = {chars:'00000000', offset:Math.random()*H, speed:0.5+Math.random()*1.5};
  binCols[name].chars = Math.abs(rssi).toString(2).padStart(8,'0');

  // tower
  tActive[name] = {rssi, ts:now};
  soundOnSignal(name, rssi, sID);
  cityOnSignal(name, rssi, sID);
}

// ── MODE 01: SPATIAL FIELD ────────────────────────────────────
function drawSpatial() {
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0,0,W,H);

  Object.entries(SENSOR_NX).forEach(([sid,nx]) => {
    const ny = SENSOR_NY[parseInt(sid)], sx = nx*W, sy = ny*H;
    ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '9px Courier New'; ctx.textAlign = 'left';
    ctx.fillText('S0'+sid, sx+7, sy+3);
  });

  const closest = getClosestHuman();

  Object.entries(active).forEach(([name,v]) => {
    if (playTime - v.ts > 8000) return;
    const [nx,ny] = getPos(name), px = nx*W, py = ny*H;
    const age = playTime - v.ts, alpha = Math.max(0, 1-age/8000);
    const norm = Math.max(0, (-v.rssi-50)/50);
    const pAge = age/8000;
    const human = isHuman(name);
    const isClosest = name === closest;

    const dotColor  = isClosest ? `rgba(80,160,255,${alpha*0.95})`
                    : human     ? `rgba(220,50,50,${alpha*0.95})`
                    :             `rgba(255,255,255,${alpha*0.9})`;
    const lblColor  = isClosest ? `rgba(80,180,255,${alpha*0.85})`
                    : human     ? `rgba(220,80,80,${alpha*0.7})`
                    :             `rgba(255,255,255,${alpha*0.38})`;
    const ringColor = isClosest ? `rgba(80,160,255,${alpha*(1-pAge%1)*0.22*norm})`
                    :             `rgba(255,255,255,${alpha*(1-(pAge+0)*0.33)*0.13*norm})`;

    for (let r=0; r<3; r++) {
      const rt = (pAge+r*0.33)%1, rad = Math.max(0, 18+rt*W*0.14);
      if (rad <= 0) continue;
      ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2);
      ctx.strokeStyle = isClosest
        ? `rgba(80,160,255,${alpha*(1-rt)*0.22*norm})`
        : `rgba(255,255,255,${alpha*(1-rt)*0.13*norm})`;
      ctx.lineWidth = isClosest ? 1.1 : 0.7; ctx.stroke();
    }
    const sx = SENSOR_NX[v.sID]*W, sy = SENSOR_NY[v.sID]*H;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(sx,sy);
    ctx.strokeStyle = isClosest ? `rgba(80,160,255,${alpha*0.18})` : `rgba(255,255,255,${alpha*0.07})`;
    ctx.lineWidth=0.4; ctx.stroke();

    ctx.beginPath(); ctx.arc(px,py,3+norm*4,0,Math.PI*2);
    ctx.fillStyle = dotColor; ctx.fill();
    ctx.fillStyle = lblColor;
    ctx.font = (human || isClosest) ? `bold 9px Courier New` : '9px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(name.slice(0,9).toUpperCase(), px+8, py+3);
  });

  document.getElementById('u-a').textContent = 'ACTIVE: '+Object.values(active).filter(v=>playTime-v.ts<5000).length;
  document.getElementById('u-s').textContent = 'SIGNALS: '+dataIdx;
}

// ── MODE 02: MATRIX TABLE ─────────────────────────────────────
function drawMatrix() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  const SIDS = [2,3,4,5];
  const devices = Object.entries(matData)
    .sort((a,b) => b[1].lastSeen - a[1].lastSeen)
    .slice(0,30);

  const closest = getClosestHuman();

  if (devices.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '11px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('WAITING FOR SIGNALS...', W/2, H/2);
    document.getElementById('u-a').textContent = 'DEVICES: 0';
    document.getElementById('u-s').textContent = '';
    return;
  }

  const PL = 130, PT = 52;
  const CW = Math.floor((W - PL - 20) / 4);
  const RH = Math.min(28, Math.floor((H - PT - 20) / devices.length));

  // Sensor headers
  SIDS.forEach((sid,ci) => {
    const cx = PL + ci*CW + CW/2;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('S0'+sid, cx, 26);
  });

  // DEVICE header
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('DEVICE', 6, 26);

  // Header line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(0,PT-4); ctx.lineTo(W,PT-4); ctx.stroke();

  // Column dividers
  SIDS.forEach((_,ci) => {
    const cx = PL + ci*CW;
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(cx,PT-4); ctx.lineTo(cx,PT+devices.length*RH); ctx.stroke();
  });

  // Rows
  devices.forEach(([name,data],ri) => {
    const y = PT + ri*RH;
    const age = playTime - data.lastSeen;
    const fade = Math.max(0.15, 1 - age/25000);

    if (ri%2===0) {
      ctx.fillStyle = 'rgba(255,255,255,0.018)';
      ctx.fillRect(0, y, W, RH);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0,y+RH); ctx.lineTo(W,y+RH); ctx.stroke();

    // Name
    const humanRow = isHuman(name);
    const isClosestRow = name === closest;
    ctx.fillStyle = isClosestRow ? `rgba(80,180,255,${fade*0.95})`
                  : humanRow    ? `rgba(220,70,70,${fade*0.85})`
                  :               `rgba(255,255,255,${fade*0.6})`;
    ctx.font = `${Math.max(8,Math.min(11,RH-5))}px Courier New`;
    ctx.textAlign = 'left';
    ctx.fillText(name.slice(0,14).toUpperCase(), 5, y+RH*0.68);

    // Cells
    SIDS.forEach((sid,ci) => {
      const cx = PL + ci*CW;
      const cell = data[sid];
      if (cell) {
        // Smooth display
        if (typeof cell.display !== 'number') cell.display = cell.rssi;
        cell.display += (cell.rssi - cell.display) * 0.1;

        const cellAge = playTime - cell.ts;
        const cf = Math.max(0.12, 1 - cellAge/15000);
        const norm = Math.max(0, Math.min(1, (-cell.rssi-50)/50));

        // Cell bg
        const bg = Math.floor(norm*45 + 8);
        ctx.fillStyle = isClosestRow
          ? `rgba(20,60,${Math.floor(norm*80+80)},${cf*0.9})`
          : `rgba(${bg},${bg},${bg},${cf*0.8})`;
        ctx.fillRect(cx+2, y+2, CW-4, RH-4);

        // Value
        const tv = Math.floor(130+norm*125);
        ctx.fillStyle = isClosestRow
          ? `rgba(100,200,255,${cf})`
          : `rgba(${tv},${tv},${tv},${cf})`;
        ctx.font = `${Math.max(8,Math.min(10,RH-6))}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillText(Math.round(cell.display)+'dB', cx+CW/2, y+RH*0.65);

        // Bar
        ctx.fillStyle = isClosestRow ? `rgba(80,180,255,${cf*0.5})` : `rgba(255,255,255,${cf*0.28})`;
        ctx.fillRect(cx+4, y+RH-4, (CW-8)*norm, 2);

        // Flash
        if (cellAge < 500) {
          ctx.fillStyle = isClosestRow
            ? `rgba(80,180,255,${(1-cellAge/500)*0.4})`
            : `rgba(255,255,255,${(1-cellAge/500)*0.3})`;
          ctx.fillRect(cx+2, y+2, CW-4, RH-4);
        }
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.font = '9px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('-', cx+CW/2, y+RH*0.68);
      }
    });
  });

  // Live indicator
  const p = Math.sin(Date.now()*0.005)*0.4+0.6;
  ctx.fillStyle = `rgba(255,255,255,${p*0.22})`;
  ctx.font = '8px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('LIVE  '+devices.length+' DEVICES', W-12, 20);

  document.getElementById('u-a').textContent = 'DEVICES: '+devices.length;
  document.getElementById('u-s').textContent = 'SIGNALS: '+dataIdx;
}


// ── MODE 03: WAVEFORM ─────────────────────────────────────────
function drawWave() {
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,H);
  const cy = H/2;
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();

  const al = Object.entries(active).filter(([,v])=>playTime-v.ts<8000);
  const closest = getClosestHuman();

  al.forEach(([name,v])=>{
    const norm=Math.max(0,(-v.rssi-50)/50);
    const amp=H*0.025+H*0.2*norm;
    const h=NAME_HUE[name]||0;
    const freq=0.007+h*0.006;
    const phase=playTime/900+h*Math.PI*2;
    const a=Math.max(0,1-(playTime-v.ts)/8000)*0.27;
    const bv=Math.floor(90+norm*165);
    const humanWave=isHuman(name);
    const isClosestWave = name === closest;
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const y=cy+Math.sin(x*freq+phase)*amp+Math.sin(x*freq*1.8+phase*1.4)*amp*0.35;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle = isClosestWave ? `rgba(80,180,255,${a*2.0})`
                    : humanWave     ? `rgba(220,60,60,${a*1.3})`
                    :                 `rgba(${bv},${bv},${bv},${a})`;
    ctx.lineWidth = isClosestWave ? 1.6 : humanWave ? 1.0 : 0.6; ctx.stroke();
  });

  if(al.length>0){
    ctx.beginPath();
    for(let x=0;x<W;x++){
      let sum=0;
      al.forEach(([name,v])=>{
        const norm=Math.max(0,(-v.rssi-50)/50);
        const h=NAME_HUE[name]||0;
        sum+=Math.sin(x*(0.007+h*0.006)+playTime/900+h*Math.PI*2)*(H*0.012+H*0.065*norm);
      });
      const y=cy+sum/Math.max(1,Math.sqrt(al.length));
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(255,255,255,0.88)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Labels
  ctx.font='9px Courier New'; ctx.textAlign='left';
  al.slice(0,12).forEach(([name,v],i)=>{
    const a=Math.max(0,1-(playTime-v.ts)/8000)*0.25;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.fillText(name.toUpperCase().slice(0,8), 12+i*Math.floor(W/12), H-18);
  });

  document.getElementById('u-a').textContent='STREAMS: '+al.length;
  document.getElementById('u-s').textContent='SIGNALS: '+dataIdx;
}

// ── MODE 03: BARCODE ANIMATED ─────────────────────────────────
function drawBarcode() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,H);

  const bars = Object.entries(barAnim)
    .sort((a,b) => b[1].lastSeen - a[1].lastSeen)
    .slice(0,80);

  if (!bars.length) { ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); return; }

  const bw = Math.max(4, Math.floor(W / bars.length));
  const closestBar = getClosestHuman();

  bars.forEach(([name,bar],i) => {
    bar.currentH = bar.currentH + (bar.targetH - bar.currentH) * (0.005 + bar.norm*0.007);
    const x = i*bw, h = bar.currentH;
    const age = playTime - bar.lastSeen;
    const fade = Math.max(0.12, 1 - age/22000);
    const bv = Math.floor(105+bar.norm*150);
    const isClosestBar = name === closestBar;

    ctx.fillStyle = isClosestBar
      ? `rgba(80,160,255,${fade})`
      : `rgba(${bv},${bv},${bv},${fade})`;
    ctx.fillRect(x, H/2-h/2, Math.max(bw-1,1), h);

    if (bw>6) {
      ctx.fillStyle = `rgba(0,0,0,${fade*0.45})`;
      for (let j=3; j<bw-2; j+=6) {
        if (Math.sin(i*13+j*0.5)>0.45) ctx.fillRect(x+j, H/2-h/2, 1, h*0.22);
      }
    }

    const na = Math.min(1, bar.currentH/(H*0.15)) * fade * 0.32;
    if (na > 0.05) {
      ctx.fillStyle = isClosestBar ? `rgba(80,200,255,${na*1.4})` : `rgba(255,255,255,${na})`;
      ctx.font = '9px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(name.slice(0,7).toUpperCase(), x+bw/2, H/2+h/2+14);
    }
  });

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect((playTime/DURATION)*W, 0, 1, H);

  document.getElementById('u-a').textContent = 'BARS: '+bars.length;
  document.getElementById('u-s').textContent = 'SIGNALS: '+dataIdx;
}

// ── MODE 04: BINARY RAIN ──────────────────────────────────────
function drawBinary() {
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0,0,W,H);

  const names = Object.keys(binCols);
  if (!names.length) return;

  const cw = W / Math.max(names.length,1), ch = 13;
  const closestBin = getClosestHuman();

  names.forEach((name,ci) => {
    const bc = binCols[name];
    const isActive = active[name] && playTime-active[name].ts<3000;
    bc.offset = (bc.offset + bc.speed*0.7) % (H+100);
    const rssi = active[name] ? active[name].rssi : -90;
    const norm = Math.max(0, (-rssi-50)/50);
    const bv = Math.floor(80+norm*175);
    const rows = Math.ceil((H+200)/ch);

    for (let r=0; r<rows; r++) {
      const y = r*ch - bc.offset + H;
      if (y<-ch || y>H+ch) continue;
      const c2 = bc.chars[r % bc.chars.length];
      const falloff = Math.max(0, 1 - Math.abs(y-H/2)/H);
      const a = c2==='1' ? (isActive?0.7:0.2)*(0.4+falloff*0.6) : (isActive?0.12:0.03)*falloff;
      const humanBin=isHuman(name);
      const isClosestBin = name === closestBin;
      const fc = isClosestBin && c2==='1' ? `rgba(80,180,255,${a*1.4})`
               : humanBin && c2==='1'     ? `rgba(220,60,60,${a*1.2})`
               :                            `rgba(${bv},${bv},${bv},${a})`;
      ctx.fillStyle=fc;
      ctx.font=`${ch-1}px Courier New`; ctx.textAlign='center';
      ctx.fillText(c2,ci*cw+cw/2,y);
    }

    const lblColor = name === closestBin ? `rgba(80,180,255,${isActive?0.9:0.25})`
                   : `rgba(255,255,255,${isActive?0.5:0.1})`;
    ctx.fillStyle = lblColor;
    ctx.font = '8px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(name.slice(0,6).toUpperCase(), ci*cw+cw/2, 15);
  });

  document.getElementById('u-a').textContent = 'STREAMS: '+names.length;
  document.getElementById('u-s').textContent = 'SIGNALS: '+dataIdx;
}

// ── MODE 05: TOWER ────────────────────────────────────────────
let tRenderer=null, tScene=null, tCamera=null, tGroup=null;
const tPermanent=[], tGrowing=[], tLayers=[];
let tRotX=0.18, tRotY=0.3, tZoom=16, tSpin=true;
let tDrag=false, tPX=0, tPY=0, tLayerCount=0, tLastLayerTime=0;
const LAYER_RISE=0.35;

class GrowingLine {
  constructor(from, to, rssi, scene) {
    this.from=from.clone(); this.to=to.clone();
    this.norm=Math.max(0,Math.min(1,(-rssi-50)/50));
    this.wavy=this.norm<0.5;
    this.progress=0; this.done=false;
    this.growSpeed=0.004+this.norm*0.005;
    this.segs=this.wavy?26:3;
    this.waveAmp=this.wavy?(1-this.norm)*0.42:0;
    this.waveFreq=3+(1-this.norm)*9;
    this.wavePhase=Math.random()*Math.PI*2;
    const bv=Math.floor(130+this.norm*125);
    const col=new THREE.Color().setRGB(bv/255,bv/255,bv/255);
    this.mat=this.wavy
      ? new THREE.LineDashedMaterial({color:col,transparent:true,opacity:0.1+this.norm*0.3,dashSize:0.07+this.norm*0.2,gapSize:0.06+(1-this.norm)*0.5})
      : new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.2+this.norm*0.6});
    this.line=new THREE.Line(new THREE.BufferGeometry(),this.mat);
    scene.add(this.line);
    tPermanent.push(this.line);
  }
  update(t) {
    if(this.done) return;
    this.progress=Math.min(1,this.progress+this.growSpeed);
    if(this.progress>=1) this.done=true;
    const pts=[];
    for(let i=0;i<=Math.ceil(this.progress*this.segs);i++){
      const s=Math.min(i/this.segs,this.progress);
      const x=this.from.x+(this.to.x-this.from.x)*s;
      const y=this.from.y+(this.to.y-this.from.y)*s;
      const z=this.from.z+(this.to.z-this.from.z)*s;
      if(this.wavy){
        const w=Math.sin(s*this.waveFreq+this.wavePhase)*this.waveAmp*(0.5+s*0.5);
        const w2=Math.cos(s*this.waveFreq*1.3+t*0.35)*this.waveAmp*0.3;
        pts.push(new THREE.Vector3(x+w*0.5,y+w2,z+w*0.5));
      } else {
        pts.push(new THREE.Vector3(x,y,z));
      }
    }
    if(pts.length>1){
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      this.line.geometry.dispose();
      this.line.geometry=geo;
      if(this.wavy) this.line.computeLineDistances();
    }
  }
}

function makeSprite(name,norm){
  const c2=document.createElement('canvas');
  c2.width=256; c2.height=48;
  const cx=c2.getContext('2d');
  cx.clearRect(0,0,256,48);
  const bv=Math.floor(140+norm*115);
  const humanSp=isHuman(name);
  cx.font=`${humanSp?'bold ':''  }${Math.floor(13+norm*5)}px Courier New`;
  cx.fillStyle=humanSp?`rgba(220,80,80,${0.5+norm*0.45})`:`rgba(${bv},${bv},${bv},${0.4+norm*0.5})`;
  cx.fillText(name.toUpperCase().slice(0,12),4,28);
  const tex=new THREE.CanvasTexture(c2);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.35+norm*0.5,depthWrite:false,depthTest:false});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(1.6,0.3,1);
  sp.renderOrder=1;
  return sp;
}

function getTXZ(name){
  if(POS[name]) return [(POS[name][0]-0.5)*5.5,(POS[name][1]-0.5)*5.5];
  let h1=0,h2=0;
  for(let i=0;i<name.length;i++){h1=(h1*31+name.charCodeAt(i))%1000;h2=(h2*17+name.charCodeAt(i))%1000;}
  return [(h1/1000-0.5)*5.5,(h2/1000-0.5)*5.5];
}

function addTowerLayer(devices,li){
  const height=li*LAYER_RISE;
  const BOX_H=LAYER_RISE*0.92; // box height = almost exactly one layer

  // Draw wireframe box for this layer
  // Box bounds = tight around where the nodes actually land
  // First pass: collect positions
  const positions=[];
  devices.forEach(({name,rssi})=>{
    const norm=Math.max(0,Math.min(1,(-rssi-50)/50));
    const [bx,bz]=getTXZ(name);
    const drift=(1-norm)*0.3,angle=(name.charCodeAt(0)/127)*Math.PI*2+li*0.6;
    const x=bx+Math.sin(angle)*drift+Math.cos(li*0.9+name.charCodeAt(0)*0.05)*drift*0.5;
    const z=bz+Math.cos(angle*0.7)*drift+Math.sin(li*0.7)*drift*0.4;
    positions.push({name,x,z,rssi,norm});
  });

  // Compute bounding box of nodes + small padding
  const PAD=0.4;
  const xs=positions.map(p=>p.x), zs=positions.map(p=>p.z);
  const minX=Math.min(...xs)-PAD, maxX=Math.max(...xs)+PAD;
  const minZ=Math.min(...zs)-PAD, maxZ=Math.max(...zs)+PAD;
  const minY=height, maxY=height+BOX_H;

  // Wireframe box — 12 edges
  const boxCorners=[
    [minX,minY,minZ],[maxX,minY,minZ],[maxX,minY,maxZ],[minX,minY,maxZ], // bottom
    [minX,maxY,minZ],[maxX,maxY,minZ],[maxX,maxY,maxZ],[minX,maxY,maxZ], // top
  ];
  const boxEdges=[
    [0,1],[1,2],[2,3],[3,0], // bottom face
    [4,5],[5,6],[6,7],[7,4], // top face
    [0,4],[1,5],[2,6],[3,7], // verticals
  ];
  const boxAlpha=0.12+Math.min(li,10)*0.008;
  const boxMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:Math.min(0.22,boxAlpha)});
  boxEdges.forEach(([a,b])=>{
    const pts=[
      new THREE.Vector3(...boxCorners[a]),
      new THREE.Vector3(...boxCorners[b])
    ];
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(geo,boxMat);
    tGroup.add(line); tPermanent.push(line);
  });

  // Now place nodes CLAMPED inside the box
  const layerNodes=[];

  // Find which node is closest to center (0,0) in this layer
  let minDist=Infinity, closestName=null;
  positions.forEach(({name,x,z})=>{
    const d=Math.sqrt(x*x+z*z);
    if(d<minDist){minDist=d;closestName=name;}
  });

  positions.forEach(({name,x,z,rssi,norm})=>{
    // Clamp x,z inside box bounds (minus padding so node is visibly inside)
    const cx=Math.max(minX+0.1,Math.min(maxX-0.1,x));
    const cz=Math.max(minZ+0.1,Math.min(maxZ-0.1,z));
    const y=height;
    layerNodes.push({name,x:cx,y,z:cz,rssi,norm});

    // Vertical connector from previous layer
    if(tLayers.length>0){
      const prev=tLayers[tLayers.length-1].find(n=>n.name===name);
      if(prev){
        const gl=new GrowingLine(
          new THREE.Vector3(prev.x,prev.y,prev.z),
          new THREE.Vector3(cx,y,cz),
          rssi,tScene
        );
        tGrowing.push(gl);
      }
    }

    // Node sphere — blue if closest to center
    const isCenter = name === closestName;
    const r=0.022+norm*0.07;
    const sg=new THREE.SphereGeometry(r * (isCenter ? 1.7 : 1), 10, 10);
    const sphereColor = isCenter   ? 0x50b4ff
                      : isHuman(name) ? 0xff3333
                      : 0xffffff;
    const sm=new THREE.MeshBasicMaterial({color:sphereColor,transparent:true,opacity:0});
    const sphere=new THREE.Mesh(sg,sm);
    sphere.position.set(cx,y,cz);
    sphere.userData={growP:0,targetO: isCenter ? 0.95 : 0.5+norm*0.45};
    sphere.scale.set(0,0,0);
    tGroup.add(sphere); tPermanent.push(sphere);

    // Glow ring for center node
    if(isCenter){
      const ringGeo=new THREE.RingGeometry(r*2.2, r*2.8, 24);
      const ringMat=new THREE.MeshBasicMaterial({color:0x50b4ff,transparent:true,opacity:0,side:THREE.DoubleSide});
      const ring=new THREE.Mesh(ringGeo,ringMat);
      ring.position.set(cx,y,cz);
      ring.rotation.x=Math.PI/2;
      ring.userData={growP:0,targetO:0.45};
      tGroup.add(ring); tPermanent.push(ring);
    }

    // Name sprite
    const sp=makeSprite(name,norm);
    sp.position.set(cx+r+0.1,y+0.16,cz);
    sp.material.opacity=0;
    sp.userData={growP:0,targetO:0.35+norm*0.5};
    tGroup.add(sp); tPermanent.push(sp);
  });

  // Horizontal edges between nearby nodes
  for(let i=0;i<layerNodes.length;i++){
    for(let j=i+1;j<layerNodes.length;j++){
      const a=layerNodes[i],b=layerNodes[j];
      const dist=Math.sqrt((a.x-b.x)**2+(a.z-b.z)**2);
      if(dist<2.8+(a.norm+b.norm)*1.5){
        const gl=new GrowingLine(
          new THREE.Vector3(a.x,height,a.z),
          new THREE.Vector3(b.x,height,b.z),
          (a.rssi+b.rssi)/2,tScene
        );
        tGrowing.push(gl);
      }
    }
  }

  tLayers.push(layerNodes);
}


// ── MODE 08: CITY ─────────────────────────────────────────────
function nameHash(name){
  let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return h;
}

let cityRenderer=null,cityScene=null,cityCamera=null,cityGroup=null;
let cityDrag=false,cityPX=0,cityPY=0,cityRotX=0.28,cityRotY=0.4,cityZoom=26;
let citySpinV=0.0015;
let cityLastMouseX=0, cityLastMouseY=0, cityDragVX=0, cityDragVY=0;
let cityAnimObjs=[],cityBuildings={},cityRainSprites=[],cityEdgeMeshes=[];
let cityLastFloor=0,cityLastRain=0,cityLastBlock=0;

function cityGetXZ(name,sId){
  const h=nameHash(name);
  const QUAD={2:[-8,-8],3:[8,-8],4:[-8,8],5:[8,8],1:[0,0]};
  const[bx,bz]=QUAD[sId]||[0,0];
  const slot=h%12,row=Math.floor(slot/4),col=slot%4;
  return[bx+(col-1.5)*2.8+((h>>4)%10-5)*0.18,bz+(row-1.0)*2.8+((h>>8)%10-5)*0.18];
}

function cityRSSIToHeight(rssi){
  const norm=Math.max(0,Math.min(1,(-rssi-52)/47));
  return 0.4+norm*12.0;
}

function cityInitRenderer(){
  if(cityRenderer)return;
  cityRenderer=new THREE.WebGLRenderer({antialias:true});
  cityRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  cityRenderer.setSize(innerWidth,innerHeight);
  cityRenderer.setClearColor(0x000000,1);
  cityRenderer.domElement.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;display:none;';
  document.body.appendChild(cityRenderer.domElement);
  cityScene=new THREE.Scene();
  cityScene.fog=new THREE.FogExp2(0x000000,0.022);
  cityCamera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,300);
  cityScene.add(new THREE.AmbientLight(0xffffff,0.04));
  const l1=new THREE.PointLight(0x8899ff,1.4,120);l1.position.set(0,30,0);cityScene.add(l1);
  const l2=new THREE.PointLight(0xffffff,0.5,80);l2.position.set(20,10,15);cityScene.add(l2);
  cityGroup=new THREE.Group();cityScene.add(cityGroup);
  cityGroup.add(new THREE.GridHelper(60,30,0x111111,0x0a0a0a));
  cityRenderer.domElement.addEventListener('mousedown',e=>{
    cityDrag=true;
    cityPX=e.clientX;cityPY=e.clientY;
    cityDragVX=0;cityDragVY=0;
    e.stopPropagation();
  });
  window.addEventListener('mouseup',()=>{
    if(!cityDrag)return;
    cityDrag=false;
    // Hand off drag velocity to spin
    citySpinV=cityDragVX*0.006;
  });
  window.addEventListener('mousemove',e=>{
    if(!cityDrag||mode!==7)return;
    const dx=e.clientX-cityPX;
    const dy=e.clientY-cityPY;
    cityDragVX=dx; cityDragVY=dy;
    cityRotY+=dx*0.006;
    cityRotX+=dy*0.006;
    cityRotX=Math.max(-0.9,Math.min(0.9,cityRotX));
    cityPX=e.clientX;cityPY=e.clientY;
  });
  cityRenderer.domElement.addEventListener('wheel',e=>{
    if(mode!==7)return;e.preventDefault();
    cityZoom=Math.max(5,Math.min(70,cityZoom+e.deltaY*0.018));
  },{passive:false});
}

function cityAddFloor(name,floorIdx,x,z,w,h,isClosest){
  const y=floorIdx*h+h*0.5;
  const geo=new THREE.BoxGeometry(w,h*0.98,w);
  const fillMat=new THREE.MeshBasicMaterial({color:isClosest?0x001833:0x110000,transparent:true,opacity:0.7});
  const fill=new THREE.Mesh(geo,fillMat);
  fill.position.set(x,y,z);cityGroup.add(fill);
  const edges=new THREE.EdgesGeometry(geo);
  const edgeColor=isClosest?0x3388ff:0xdd2222;
  const edgeMat=new THREE.LineBasicMaterial({color:edgeColor,transparent:true,opacity:0});
  const wireframe=new THREE.LineSegments(edges,edgeMat);
  wireframe.position.set(x,y,z);
  wireframe.userData={growP:0,targetO:isClosest?0.9:0.65};
  cityGroup.add(wireframe);cityAnimObjs.push(wireframe);
  if(floorIdx%2===0||isClosest){
    const winGeo=new THREE.PlaneGeometry(w*0.22,h*0.35);
    const winColor=isClosest?0x50b4ff:0xff4444;
    const winMat=new THREE.MeshBasicMaterial({color:winColor,transparent:true,opacity:0,side:THREE.DoubleSide});
    [-1,1].forEach(side=>{
      const win=new THREE.Mesh(winGeo,winMat.clone());
      win.position.set(x+side*(w*0.5+0.01),y+h*0.05,z);
      win.rotation.y=Math.PI/2;
      win.userData={growP:0,targetO:isClosest?0.7:0.5};
      cityGroup.add(win);cityAnimObjs.push(win);
    });
  }
  return{fill,wireframe,y};
}

function cityBuildRoof(name,x,z,topY,w,isClosest){
  const b=cityBuildings[name];
  if(!b||b.roofDone)return;b.roofDone=true;
  const roofColor=isClosest?0x50b4ff:0xff3333;
  const apex=new THREE.Vector3(x,topY+0.6,z);
  const corners=[
    new THREE.Vector3(x-w/2,topY,z-w/2),new THREE.Vector3(x+w/2,topY,z-w/2),
    new THREE.Vector3(x+w/2,topY,z+w/2),new THREE.Vector3(x-w/2,topY,z+w/2),
  ];
  corners.forEach((c,i)=>{
    const next=corners[(i+1)%4];
    const geo=new THREE.BufferGeometry().setFromPoints([c,next,apex]);
    const mat=new THREE.LineBasicMaterial({color:roofColor,transparent:true,opacity:0});
    const line=new THREE.Line(geo,mat);
    line.userData={growP:0,targetO:isClosest?0.9:0.5};
    cityGroup.add(line);cityAnimObjs.push(line);
  });
  const capPts=[...corners,corners[0]];
  const capGeo=new THREE.BufferGeometry().setFromPoints(capPts);
  const capMat=new THREE.LineBasicMaterial({color:roofColor,transparent:true,opacity:0});
  const cap=new THREE.Line(capGeo,capMat);
  cap.userData={growP:0,targetO:isClosest?0.85:0.45};
  cityGroup.add(cap);cityAnimObjs.push(cap);
  const norm=Math.max(0,Math.min(1,(-b.rssi-52)/47));
  if(norm>0.65){
    const antGeo=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x,topY+0.6,z),new THREE.Vector3(x,topY+0.6+norm*1.8,z)
    ]);
    const antMat=new THREE.LineBasicMaterial({color:isClosest?0x88ddff:0xff6666,transparent:true,opacity:0});
    const ant=new THREE.Line(antGeo,antMat);
    ant.userData={growP:0,targetO:0.95};
    cityGroup.add(ant);cityAnimObjs.push(ant);
  }
}

function citySpawnRain(x,z,topY,rssi,isClosest){
  const norm=Math.max(0,Math.min(1,(-rssi-52)/47));
  const chars=Math.abs(Math.round(rssi)).toString(2).padStart(8,'0');
  const count=Math.floor(6+norm*16);
  for(let i=0;i<count;i++){
    const c=document.createElement('canvas');c.width=20;c.height=20;
    const cx=c.getContext('2d');
    cx.font='bold 14px Courier New';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=isClosest?'#50b4ff':'#ff4444';
    cx.fillText(chars[i%chars.length],10,10);
    const tex=new THREE.CanvasTexture(c);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.7*(1-i/count),depthWrite:false});
    const sp=new THREE.Sprite(mat);
    sp.scale.set(0.3,0.3,0.3);
    sp.position.set(x+(Math.random()-0.5)*1.2,topY+i*0.32,z+(Math.random()-0.5)*1.2);
    sp.userData={vy:-(0.02+norm*0.04+Math.random()*0.02),startY:topY+i*0.32,baseO:0.7*(1-i/count)};
    cityGroup.add(sp);cityRainSprites.push(sp);
  }
}

function cityRebuildBlock(){
  cityEdgeMeshes.forEach(l=>cityGroup.remove(l));cityEdgeMeshes=[];
  const buildings=Object.entries(cityBuildings).filter(([,b])=>b.currentH>0.3);
  const closest=getClosestHuman();
  for(let i=0;i<buildings.length;i++){
    for(let j=i+1;j<buildings.length;j++){
      const[nA,bA]=buildings[i],[,bB]=buildings[j];
      const dx=bA.x-bB.x,dz=bA.z-bB.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>12)continue;
      const isBlue=nA===closest||buildings[j][0]===closest;
      const pts=[new THREE.Vector3(bA.x,bA.currentH,bA.z),new THREE.Vector3(bB.x,bB.currentH,bB.z)];
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const mat=new THREE.LineBasicMaterial({color:isBlue?0x3388ff:0x222222,transparent:true,opacity:isBlue?0.4:Math.max(0.05,0.25*(1-dist/12))});
      const line=new THREE.Line(geo,mat);cityGroup.add(line);cityEdgeMeshes.push(line);
    }
  }
}

function cityOnSignal(name,rssi,sId){
  if(!cityGroup||!isHuman(name))return;
  const closest=getClosestHuman();
  const isClosest=name===closest;
  const[x,z]=cityGetXZ(name,sId);
  const targetH=cityRSSIToHeight(rssi);
  const floorH=0.55;
  const buildingW=1.2+Math.max(0,(-rssi-52)/47)*0.6;
  if(!cityBuildings[name]){
    cityBuildings[name]={floors:[],roofDone:false,x,z,targetH,currentH:0,rssi,sId,buildingW,isClosest,nextFloor:0};
  } else {
    cityBuildings[name].targetH=targetH;
    cityBuildings[name].rssi=rssi;
    cityBuildings[name].isClosest=isClosest;
  }
}

function cityLoop(){
  requestAnimationFrame(cityLoop);
  if(mode!==7||!cityRenderer||!cityCamera)return;
  const now=Date.now();
  if(now-cityLastFloor>120){
    cityLastFloor=now;
    Object.entries(cityBuildings).forEach(([name,b])=>{
      const closest=getClosestHuman();
      const isClosest=name===closest;
      const neededFloors=Math.floor(b.targetH/0.55);
      if(b.nextFloor<neededFloors){
        const floorObj=cityAddFloor(name,b.nextFloor,b.x,b.z,b.buildingW,0.55,isClosest);
        b.floors.push(floorObj);b.currentH=(b.nextFloor+1)*0.55;b.nextFloor++;
      } else if(!b.roofDone&&b.nextFloor>=neededFloors&&neededFloors>0){
        cityBuildRoof(name,b.x,b.z,b.currentH,b.buildingW,isClosest);
      }
    });
  }
  if(now-cityLastRain>600){
    cityLastRain=now;
    const closest=getClosestHuman();
    Object.entries(cityBuildings).forEach(([name,b])=>{
      if(b.currentH<0.5)return;
      citySpawnRain(b.x,b.z,b.currentH,b.rssi,name===closest);
    });
  }
  if(now-cityLastBlock>500){cityLastBlock=now;cityRebuildBlock();}
  cityAnimObjs.forEach(o=>{
    if(o.userData&&o.userData.growP<1){
      o.userData.growP=Math.min(1,o.userData.growP+0.03);
      if(o.material)o.material.opacity=o.userData.targetO*o.userData.growP;
    }
  });
  for(let i=cityRainSprites.length-1;i>=0;i--){
    const sp=cityRainSprites[i];
    sp.position.y+=sp.userData.vy;
    const dist=sp.userData.startY-sp.position.y;
    const frac=Math.min(1,dist/(sp.userData.startY-(-0.1)+0.01));
    sp.material.opacity=sp.userData.baseO*(1-frac);
    if(sp.position.y<-0.1){cityGroup.remove(sp);cityRainSprites.splice(i,1);}
  }
  if(cityRainSprites.length>800){const r=cityRainSprites.splice(0,200);r.forEach(sp=>cityGroup.remove(sp));}
  if(!cityDrag){
    cityRotY+=citySpinV;
    // Decay toward base spin speed
    citySpinV+=(0.0015-citySpinV)*0.04;
  }
  const lookY=4;
  cityCamera.position.x=cityZoom*Math.sin(cityRotY)*Math.cos(cityRotX);
  cityCamera.position.y=lookY+cityZoom*Math.sin(cityRotX);
  cityCamera.position.z=cityZoom*Math.cos(cityRotY)*Math.cos(cityRotX);
  cityCamera.lookAt(0,lookY,0);
  cityCamera.aspect=innerWidth/innerHeight;
  cityCamera.updateProjectionMatrix();
  cityRenderer.setSize(innerWidth,innerHeight);
  cityRenderer.render(cityScene,cityCamera);
  const bCount=Object.keys(cityBuildings).length;
  const fCount=Object.values(cityBuildings).reduce((s,b)=>s+b.floors.length,0);
  document.getElementById('u-a').textContent='BUILDINGS: '+bCount;
  document.getElementById('u-s').textContent='FLOORS: '+fCount;
}


function initTower(){

  const r2=new THREE.PointLight(0xffffff,0.4,50); r2.position.set(-10,-6,12); tScene.add(r2);

  });

    tZoom=Math.max(3,Math.min(45,tZoom+e.deltaY*0.014));
  },{passive:false});
  tLastLayerTime=Date.now();
}

function towerLoop(){
  requestAnimationFrame(towerLoop);
  if(mode!==4||!tRenderer) return;
  const t=performance.now()*0.001;
  const now=Date.now();
  if(now-tLastLayerTime>2500&&!paused){
    tLastLayerTime=now;
    const devs=Object.entries(tActive).filter(([,v])=>playTime-v.ts<5000).map(([n,v])=>({name:n,rssi:v.rssi}));
    if(devs.length>0){addTowerLayer(devs,tLayerCount);tLayerCount++;}
  }
  for(let i=tGrowing.length-1;i>=0;i--){tGrowing[i].update(t);if(tGrowing[i].done)tGrowing.splice(i,1);}
  tPermanent.forEach(o=>{
    if(o.userData&&o.userData.growP!==undefined&&o.userData.growP<1){
      o.userData.growP=Math.min(1,o.userData.growP+0.018);
      const p=o.userData.growP;
      if(o.isMesh){o.scale.set(p,p,p);o.material.opacity=o.userData.targetO*p;}
      else if(o.isSprite){o.material.opacity=o.userData.targetO*p;}
    }
  });
  const tH=tLayerCount*LAYER_RISE;
  if(tSpin&&!tDrag) tRotY+=0.0022;
  const lookY=Math.max(1,tH*0.45);
  tCamera.position.x=tZoom*Math.sin(tRotY)*Math.cos(tRotX);
  tCamera.position.y=lookY+tZoom*Math.sin(tRotX);
  tCamera.position.z=tZoom*Math.cos(tRotY)*Math.cos(tRotX);
  tCamera.lookAt(0,lookY,0);
  tCamera.aspect=window.innerWidth/window.innerHeight;
  tCamera.updateProjectionMatrix();
  tRenderer.setSize(window.innerWidth,window.innerHeight);
  tRenderer.render(tScene,tCamera);
  document.getElementById('u-a').textContent='LAYERS: '+tLayerCount;
  document.getElementById('u-s').textContent='NODES: '+tPermanent.filter(o=>o.isMesh).length;
}

// ── MODE 07: EVOLUTION 3D ─────────────────────────────────────
let e3Renderer=null, e3Scene=null, e3Camera=null, e3Group=null;
let e3RotX=0.22, e3RotY=0.4, e3Zoom=18, e3Spin=true;
let e3Drag=false, e3PX=0, e3PY=0;
let e3LayerCount=0, e3LastLayerTime=0;
const e3Permanent=[], e3Growing=[], e3Layers=[];
const E3_LAYER_RISE = 0.38;

function initEvolution3D() {
  if (e3Renderer) return;
  e3Renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  e3Renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  e3Renderer.setSize(window.innerWidth, window.innerHeight);
  e3Renderer.setClearColor(0x000000, 1);
  e3Renderer.domElement.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;display:none;';
  document.body.appendChild(e3Renderer.domElement);

  e3Scene = new THREE.Scene();
  e3Scene.fog = new THREE.FogExp2(0x000000, 0.009);
  e3Camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 300);
  e3Scene.add(new THREE.AmbientLight(0xffffff, 0.06));
  const l1 = new THREE.PointLight(0x4499ff, 1.2, 90); l1.position.set(10,18,10); e3Scene.add(l1);
  const l2 = new THREE.PointLight(0xffffff, 0.5, 60); l2.position.set(-10,-4,12); e3Scene.add(l2);
  e3Group = new THREE.Group(); e3Scene.add(e3Group);

  // Drag to rotate
  e3Renderer.domElement.addEventListener('mousedown', e=>{e3Drag=true;e3PX=e.clientX;e3PY=e.clientY;});
  window.addEventListener('mouseup', ()=>e3Drag=false);
  window.addEventListener('mousemove', e=>{
    if(!e3Drag||mode!==6) return;
    e3RotY+=(e.clientX-e3PX)*0.007; e3RotX+=(e.clientY-e3PY)*0.007;
    e3RotX=Math.max(-1.2,Math.min(1.2,e3RotX)); e3PX=e.clientX; e3PY=e.clientY;
  });
  e3Renderer.domElement.addEventListener('wheel', e=>{
    if(mode!==6) return; e.preventDefault();
    e3Zoom=Math.max(3,Math.min(50,e3Zoom+e.deltaY*0.014));
  },{passive:false});

  e3LastLayerTime = Date.now();
}

// Build one Evolution3D layer
function addEvolution3DLayer(devices, li) {
  const height = li * E3_LAYER_RISE;
  const norm_all = devices.map(d=>Math.max(0,Math.min(1,(-d.rssi-50)/50)));
  const humans = devices.filter(d=>isHuman(d.name));

  // Positions (same mapping as tower)
  const positions = devices.map(d=>{
    const norm = Math.max(0,Math.min(1,(-d.rssi-50)/50));
    const [bx,bz] = getTXZ(d.name);
    const drift=(1-norm)*0.3, angle=(d.name.charCodeAt(0)/127)*Math.PI*2+li*0.6;
    return {
      name: d.name,
      rssi: d.rssi,
      norm,
      x: bx+Math.sin(angle)*drift+Math.cos(li*0.9+d.name.charCodeAt(0)*0.05)*drift*0.5,
      z: bz+Math.cos(angle*0.7)*drift+Math.sin(li*0.7)*drift*0.4,
      y: height
    };
  });

  // Bounding box wireframe
  const PAD=0.4;
  const xs=positions.map(p=>p.x), zs=positions.map(p=>p.z);
  const minX=Math.min(...xs)-PAD, maxX=Math.max(...xs)+PAD;
  const minZ=Math.min(...zs)-PAD, maxZ=Math.max(...zs)+PAD;
  const BOX_H=E3_LAYER_RISE*0.9;
  const boxCorners=[
    [minX,height,minZ],[maxX,height,minZ],[maxX,height,maxZ],[minX,height,maxZ],
    [minX,height+BOX_H,minZ],[maxX,height+BOX_H,minZ],[maxX,height+BOX_H,maxZ],[minX,height+BOX_H,maxZ],
  ];
  const boxEdges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  const boxAlpha=Math.min(0.18, 0.07+li*0.007);
  const boxMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:boxAlpha});
  boxEdges.forEach(([a,b])=>{
    const geo=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(...boxCorners[a]),
      new THREE.Vector3(...boxCorners[b])
    ]);
    const line=new THREE.Line(geo,boxMat);
    e3Group.add(line); e3Permanent.push(line);
  });

  // Find closest to center in this layer
  let minDist=Infinity, closestInLayer=null;
  positions.forEach(p=>{
    if(!isHuman(p.name)) return;
    const d=Math.sqrt(p.x*p.x+p.z*p.z);
    if(d<minDist){minDist=d;closestInLayer=p.name;}
  });

  const layerNodes=[];
  positions.forEach(p=>{
    const cx=Math.max(minX+0.1,Math.min(maxX-0.1,p.x));
    const cz=Math.max(minZ+0.1,Math.min(maxZ-0.1,p.z));
    layerNodes.push({...p, x:cx, z:cz});

    // Vertical connector from previous layer
    if(e3Layers.length>0){
      const prev=e3Layers[e3Layers.length-1].find(n=>n.name===p.name);
      if(prev){
        const gl=new GrowingLine(
          new THREE.Vector3(prev.x,prev.y,prev.z),
          new THREE.Vector3(cx,height,cz),
          p.rssi, e3Scene
        );
        e3Growing.push(gl);
      }
    }

    // Binary rain — sprites falling DOWN from node (matching mode 04 exactly)
    // Each node gets a column of 0/1 chars that scroll downward in 3D
    const bc = binCols[p.name];
    if(bc){
      const charStep = 0.13; // vertical spacing between chars in 3D units
      const rainDepth = 2.2 + p.norm * 3.0; // how far down the rain falls
      const totalRows = Math.ceil(rainDepth / charStep);
      const scrollOffset = (performance.now() * 0.0008 * bc.speed) % charStep;
      const isClosestRain = p.name === closestInLayer;
      const humanRain = isHuman(p.name);

      for(let r = 0; r < totalRows; r++){
        const yPos = height - r * charStep - scrollOffset;
        const fallFrac = r / totalRows; // 0 = top (near node), 1 = bottom
        const ch = bc.chars[r % bc.chars.length];
        const isBit1 = ch === '1';

        const opacity = isBit1
          ? (1 - fallFrac) * (0.55 + p.norm * 0.35)
          : (1 - fallFrac) * 0.08;
        if(opacity < 0.04) continue;

        // Make a small canvas texture for this char
        const cc = document.createElement('canvas');
        cc.width = 24; cc.height = 24;
        const cx2 = cc.getContext('2d');
        cx2.font = 'bold 16px Courier New';
        cx2.textAlign = 'center';
        cx2.textBaseline = 'middle';
        const color = isClosestRain && isBit1 ? '#50b4ff'
                    : humanRain && isBit1      ? '#ff4444'
                    : `rgb(${Math.floor(80+p.norm*175)},${Math.floor(80+p.norm*175)},${Math.floor(80+p.norm*175)})`;
        cx2.fillStyle = color;
        cx2.fillText(ch, 12, 12);

        const tex = new THREE.CanvasTexture(cc);
        const mat = new THREE.SpriteMaterial({map:tex, transparent:true, opacity, depthWrite:false});
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(0.18, 0.18, 0.18);
        sprite.position.set(cx, yPos, cz);
        sprite.userData = {
          growP: 1, targetO: opacity,
          rainNode: true, // flag for animation
          scrollSpeed: bc.speed * 0.00008,
          charStep,
          totalRows,
          startY: height,
          rowIndex: r
        };
        e3Group.add(sprite);
        e3Permanent.push(sprite);
      }
    }

    // Main sphere
    const isCenter = p.name===closestInLayer;
    const r=0.025+p.norm*0.075;
    const sg=new THREE.SphereGeometry(r*(isCenter?1.8:1),10,10);
    const sphereColor = isCenter ? 0x50b4ff : isHuman(p.name) ? 0xff3333 : 0xffffff;
    const sm=new THREE.MeshBasicMaterial({color:sphereColor,transparent:true,opacity:0});
    const sphere=new THREE.Mesh(sg,sm);
    sphere.position.set(cx,height,cz);
    sphere.userData={growP:0, targetO:isCenter?0.95:0.55+p.norm*0.4};
    sphere.scale.set(0,0,0);
    e3Group.add(sphere); e3Permanent.push(sphere);

    // Ring around closest
    if(isCenter){
      const rgeo=new THREE.RingGeometry(r*2.2,r*3.0,28);
      const rmat=new THREE.MeshBasicMaterial({color:0x50b4ff,transparent:true,opacity:0,side:THREE.DoubleSide});
      const ring=new THREE.Mesh(rgeo,rmat);
      ring.position.set(cx,height,cz);
      ring.rotation.x=Math.PI/2;
      ring.userData={growP:0,targetO:0.5};
      e3Group.add(ring); e3Permanent.push(ring);
    }

    // Name label
    const sp=makeSprite(p.name,p.norm);
    sp.position.set(cx+r+0.12,height+0.18,cz);
    sp.material.opacity=0;
    sp.userData={growP:0,targetO:0.35+p.norm*0.5};
    e3Group.add(sp); e3Permanent.push(sp);
  });

  // Horizontal connection lines between humans in same layer (Evolution style)
  const humanNodes = layerNodes.filter(n=>isHuman(n.name));
  for(let i=0;i<humanNodes.length;i++){
    for(let j=i+1;j<humanNodes.length;j++){
      const a=humanNodes[i], b=humanNodes[j];
      const dist=Math.sqrt((b.x-a.x)**2+(b.z-a.z)**2);
      if(dist>4.5) continue;
      const avgNorm=(a.norm+b.norm)*0.5;
      const isBlue = a.name===closestInLayer||b.name===closestInLayer;
      const gl=new GrowingLine(
        new THREE.Vector3(a.x,height,a.z),
        new THREE.Vector3(b.x,height,b.z),
        Math.max(a.rssi,b.rssi), e3Scene
      );
      // Override color for blue closest
      if(isBlue && gl.line && gl.line.material){
        gl.line.material.color.setHex(0x50b4ff);
        gl.line.material.opacity=0.35;
      }
      e3Growing.push(gl);
    }
  }

  e3Layers.push(layerNodes);
}

function evolution3DLoop(){
  requestAnimationFrame(evolution3DLoop);
  if(mode!==6||!e3Renderer) return;
  const t=performance.now()*0.001;
  const now=Date.now();

  if(now-e3LastLayerTime>2500&&!paused){
    e3LastLayerTime=now;
    const devs=Object.entries(tActive).filter(([,v])=>playTime-v.ts<5000).map(([n,v])=>({name:n,rssi:v.rssi}));
    if(devs.length>0){addEvolution3DLayer(devs,e3LayerCount);e3LayerCount++;}
  }

  for(let i=e3Growing.length-1;i>=0;i--){e3Growing[i].update(t);if(e3Growing[i].done)e3Growing.splice(i,1);}
  e3Permanent.forEach(o=>{
    if(o.userData&&o.userData.growP!==undefined&&o.userData.growP<1){
      o.userData.growP=Math.min(1,o.userData.growP+0.018);
      const p=o.userData.growP;
      if(o.isMesh){o.scale.set(p,p,p);o.material.opacity=o.userData.targetO*p;}
      else if(o.isSprite&&!o.userData.rainNode){o.material.opacity=o.userData.targetO*p;}
    }
    // Animate rain sprites — scroll downward
    if(o.isSprite && o.userData.rainNode){
      o.position.y -= o.userData.scrollSpeed;
      // Reset to top when falls past bottom
      const bottom = o.userData.startY - o.userData.totalRows * o.userData.charStep;
      if(o.position.y < bottom) o.position.y = o.userData.startY;
      // Fade based on distance from node
      const dist = o.userData.startY - o.position.y;
      const frac = dist / (o.userData.totalRows * o.userData.charStep);
      o.material.opacity = o.userData.targetO * Math.max(0, 1 - frac);
    }
  });

  const tH=e3LayerCount*E3_LAYER_RISE;
  if(e3Spin&&!e3Drag) e3RotY+=0.002;
  const lookY=Math.max(1,tH*0.45);
  e3Camera.position.x=e3Zoom*Math.sin(e3RotY)*Math.cos(e3RotX);
  e3Camera.position.y=lookY+e3Zoom*Math.sin(e3RotX);
  e3Camera.position.z=e3Zoom*Math.cos(e3RotY)*Math.cos(e3RotX);
  e3Camera.lookAt(0,lookY,0);
  e3Camera.aspect=window.innerWidth/window.innerHeight;
  e3Camera.updateProjectionMatrix();
  e3Renderer.setSize(window.innerWidth,window.innerHeight);
  e3Renderer.render(e3Scene,e3Camera);
  document.getElementById('u-a').textContent='LAYERS: '+e3LayerCount;
  document.getElementById('u-s').textContent='NODES: '+e3Permanent.filter(o=>o.isMesh).length;
}

// ── MODE 06: EVOLUTION ────────────────────────────────────────
// Layer 1: Spatial dots + rings (from mode 01)
// Layer 2: Binary rain falling from each dot (from mode 04)
// Layer 3: Tension lines connecting all nodes (from mode 05)
function drawEvolution() {
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,H);

  const now = Date.now();
  const closest = getClosestHuman();

  // Collect active entries
  const entries = Object.entries(active).filter(([,v]) => playTime - v.ts < 8000);
  if (!entries.length) return;

  // ── LAYER 3: connection lines between all human nodes (Tower-style)
  const humans = entries.filter(([n]) => isHuman(n));
  for (let i = 0; i < humans.length; i++) {
    for (let j = i+1; j < humans.length; j++) {
      const [nA, vA] = humans[i];
      const [nB, vB] = humans[j];
      const [nxA, nyA] = getPos(nA);
      const [nxB, nyB] = getPos(nB);
      const pxA = nxA*W, pyA = nyA*H;
      const pxB = nxB*W, pyB = nyB*H;
      const dist = Math.sqrt((pxB-pxA)**2 + (pyB-pyA)**2);
      if (dist > W * 0.55) continue; // only connect nearby nodes

      const aA = Math.max(0, 1-(playTime-vA.ts)/8000);
      const aB = Math.max(0, 1-(playTime-vB.ts)/8000);
      const lineA = aA * aB * 0.18;

      const isClosestLine = nA === closest || nB === closest;
      ctx.beginPath();
      ctx.moveTo(pxA, pyA);

      // Slight curve via midpoint wobble
      const mx = (pxA+pxB)/2 + Math.sin(playTime*0.0008 + i*1.3)*12;
      const my = (pyA+pyB)/2 + Math.cos(playTime*0.0007 + j*0.9)*12;
      ctx.quadraticCurveTo(mx, my, pxB, pyB);

      ctx.strokeStyle = isClosestLine
        ? `rgba(80,160,255,${lineA*1.8})`
        : `rgba(255,255,255,${lineA})`;
      ctx.lineWidth = isClosestLine ? 0.8 : 0.4;
      ctx.stroke();
    }
  }

  // ── LAYER 2: binary rain falling from each dot
  entries.forEach(([name, v]) => {
    const [nx,ny] = getPos(name);
    const px = nx*W, py = ny*H;
    const alpha = Math.max(0, 1-(playTime-v.ts)/8000);
    const norm = Math.max(0, (-v.rssi-50)/50);
    const bc = binCols[name];
    if (!bc) return;

    const isClosestRain = name === closest;
    const human = isHuman(name);
    const cols = Math.max(1, Math.floor(norm * 4) + 1); // 1–5 columns per node
    const spread = 18 + norm * 30;

    for (let c = 0; c < cols; c++) {
      const offsetX = cols === 1 ? 0 : (c/(cols-1) - 0.5) * spread;
      const colX = px + offsetX;
      const charH = 11;
      const rows = Math.ceil((H - py) / charH);

      for (let r = 0; r < rows; r++) {
        const y = py + r * charH + ((bc.offset + c * 37) % charH);
        if (y > H) break;
        const falloff = Math.max(0, 1 - (y - py) / (H * 0.55));
        const ch = bc.chars[(r + c*3) % bc.chars.length];
        const a = ch==='1'
          ? alpha * falloff * (0.5 + norm*0.3)
          : alpha * falloff * 0.08;
        if (a < 0.02) continue;

        ctx.fillStyle = isClosestRain && ch==='1'
          ? `rgba(80,180,255,${a})`
          : human && ch==='1'
          ? `rgba(220,80,80,${a})`
          : `rgba(200,200,200,${a})`;
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(ch, colX, y);
      }
    }
    // Animate offset
    if (bc) bc.offset = (bc.offset + bc.speed * 0.5) % (H + 100);
  });

  // ── LAYER 1: spatial dots + expanding rings (on top)
  entries.forEach(([name, v]) => {
    const [nx,ny] = getPos(name);
    const px = nx*W, py = ny*H;
    const age = playTime - v.ts;
    const alpha = Math.max(0, 1 - age/8000);
    const norm = Math.max(0, (-v.rssi-50)/50);
    const pAge = (age % 5000) / 5000;
    const human = isHuman(name);
    const isClosest = name === closest;

    // Expanding rings
    for (let r = 0; r < 3; r++) {
      const rt = (pAge + r*0.33) % 1;
      const rad = Math.max(0, 12 + rt * W * 0.09 * norm);
      if (rad <= 0) continue;
      ctx.beginPath(); ctx.arc(px, py, rad, 0, Math.PI*2);
      ctx.strokeStyle = isClosest
        ? `rgba(80,160,255,${alpha*(1-rt)*0.35})`
        : human
        ? `rgba(220,60,60,${alpha*(1-rt)*0.22})`
        : `rgba(255,255,255,${alpha*(1-rt)*0.1})`;
      ctx.lineWidth = isClosest ? 1.0 : 0.6;
      ctx.stroke();
    }

    // Sensor connection line
    const sx = SENSOR_NX[v.sID]*W, sy = SENSOR_NY[v.sID]*H;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(sx,sy);
    ctx.strokeStyle = isClosest
      ? `rgba(80,160,255,${alpha*0.15})`
      : `rgba(255,255,255,${alpha*0.05})`;
    ctx.lineWidth = 0.3; ctx.stroke();

    // Core dot
    const dotR = Math.max(0.5, 2.5 + norm*4);
    ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI*2);
    ctx.fillStyle = isClosest
      ? `rgba(80,180,255,${alpha*0.95})`
      : human
      ? `rgba(220,60,60,${alpha*0.95})`
      : `rgba(255,255,255,${alpha*0.7})`;
    ctx.fill();

    // Label
    if (alpha > 0.25 && (human || isClosest)) {
      ctx.fillStyle = isClosest
        ? `rgba(80,200,255,${alpha*0.7})`
        : `rgba(220,80,80,${alpha*0.55})`;
      ctx.font = 'bold 8px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(name.slice(0,8).toUpperCase(), px + dotR + 4, py + 3);
    }
  });

  // Sensor markers
  Object.entries(SENSOR_NX).forEach(([sid,nx]) => {
    const sy = SENSOR_NY[parseInt(sid)]*H, sx = nx*W;
    ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.14)';
    ctx.font='8px Courier New'; ctx.textAlign='left';
    ctx.fillText('S0'+sid, sx+5, sy+3);
  });

  document.getElementById('u-a').textContent = 'ACTIVE: '+entries.length;
  document.getElementById('u-s').textContent = 'SIGNALS: '+dataIdx;
}

// ── MAIN LOOP ─────────────────────────────────────────────────
const DRAWS=[drawSpatial,drawMatrix,drawWave,drawBinary,null,drawEvolution,null];

function loop(ts){
  requestAnimationFrame(loop);
  if(!paused){
    if(lastT!==null){
      playTime+=((ts-lastT)*speed);
      if(playTime>=DURATION){playTime=0;dataIdx=0;}
      while(dataIdx<RAW.length&&RAW[dataIdx][0]<=playTime){onSignal(RAW[dataIdx]);dataIdx++;}
    }
    lastT=ts;
  } else { lastT=null; }

  const s=Math.floor(playTime/1000);
  document.getElementById('u-t').textContent='T+'+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

  if(mode===4){
    cv.style.display='none';
    if(tRenderer) tRenderer.domElement.style.display='block';
    if(e3Renderer) e3Renderer.domElement.style.display='none';
    if(cityRenderer) cityRenderer.domElement.style.display='none';
  } else if(mode===6){
    cv.style.display='none';
    if(tRenderer) tRenderer.domElement.style.display='none';
    if(e3Renderer) e3Renderer.domElement.style.display='block';
    if(cityRenderer) cityRenderer.domElement.style.display='none';
  } else if(mode===7){
    cv.style.display='none';
    if(tRenderer) tRenderer.domElement.style.display='none';
    if(e3Renderer) e3Renderer.domElement.style.display='none';
    if(cityRenderer) cityRenderer.domElement.style.display='block';
  } else {
    cv.style.display='block';
    if(tRenderer) tRenderer.domElement.style.display='none';
    if(e3Renderer) e3Renderer.domElement.style.display='none';
    if(cityRenderer) cityRenderer.domElement.style.display='none';
    if(DRAWS[mode]) DRAWS[mode]();
  }
}

// ── CONTROLS ──────────────────────────────────────────────────
function setMode(m){
  mode=m;
  [1,2,3,4,5,6,7,8].forEach(i=>{const b=document.getElementById('b'+i);if(b)b.classList.toggle('on',i-1===m);});
  document.getElementById('ml').textContent=MODES[m];
  if(m===4){initTower();if(tRenderer)tRenderer.domElement.style.display='block';}
  else if(m===6){initEvolution3D();if(e3Renderer)e3Renderer.domElement.style.display='block';}
  else if(m===7){
    cityInitRenderer();
    if(cityRenderer)cityRenderer.domElement.style.display='block';
    Object.entries(active).forEach(([name,v])=>{
      if(playTime-v.ts<8000) cityOnSignal(name,v.rssi,v.sID||1);
    });
  }
  else{
    if(tRenderer)tRenderer.domElement.style.display='none';
    if(e3Renderer)e3Renderer.domElement.style.display='none';
    if(cityRenderer)cityRenderer.domElement.style.display='none';
  }
}

function togglePause(){
  paused=!paused;
  document.getElementById('bp').textContent=paused?'PLAY':'PAUSE';
  document.getElementById('bp').classList.toggle('on',paused);
}

function restart(){
  playTime=0;dataIdx=0;lastT=null;
  [active,matData,barAnim,binCols,tActive].forEach(o=>Object.keys(o).forEach(k=>delete o[k]));
  tLayerCount=0;tLayers.length=0;tLastLayerTime=Date.now();
  tPermanent.forEach(o=>{if(tGroup){tGroup.remove(o);}if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});
  tPermanent.length=0;tGrowing.length=0;
  ctx.clearRect(0,0,W,H);
}

window.addEventListener('keydown',e=>{
  if(e.key==='1')setMode(0);if(e.key==='2')setMode(1);
  if(e.key==='3')setMode(2);if(e.key==='4')setMode(3);if(e.key==='5')setMode(4);if(e.key==='6')setMode(5);if(e.key==='7')setMode(6);if(e.key==='8')setMode(7);
  if(e.key===' '){e.preventDefault();togglePause();}
  if(e.key==='r'||e.key==='R')restart();
  if(e.key==='s'||e.key==='S'){tSpin=!tSpin;}
  if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// ── SOUND ENGINE — Nicolai / Alva Noto style ──────────────────
// Direct RSSI → Hz mapping. No rhythm. No scale.
// Each human = one pure sine tone that breathes with their signal.
// Tones fade in on arrival, glide on change, decay on disappearance.

let audioCtx  = null;
let masterGain = null;
let reverbSend = null;
let soundEnabled = false;
let soundReady   = false;

// name → { osc, gainNode, panNode, currentFreq, targetFreq, lastSeen, rssi }
const voices = {};

const SENSOR_PAN = { 1: 0, 2: -0.85, 3: 0.85, 4: -0.45, 5: 0.45 };

// ── RSSI → frequency: direct linear mapping, no musical scale
// RSSI range in this dataset: -99 to -52
// Map to 40hz–3200hz (5.3 octaves) — pure, non-musical spread
function rssiToHz(rssi) {
  const norm = Math.max(0, Math.min(1, (-rssi - 52) / 47)); // 0=weak(-99) 1=strong(-52)
  // Exponential curve gives perceptually even spread across octaves
  return 40 * Math.pow(80, norm); // 40hz → 3200hz
}

// ── RSSI → amplitude: stronger signal = slightly louder
function rssiToAmp(rssi) {
  const norm = Math.max(0, Math.min(1, (-rssi - 52) / 47));
  return 0.022 + norm * 0.055;
}

// ── Build convolution reverb (large space feel)
function buildReverb() {
  const sRate = audioCtx.sampleRate;
  const len   = sRate * 3.2;
  const buf   = audioCtx.createBuffer(2, len, sRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      // Exponential decay + diffusion
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8);
    }
  }
  const conv = audioCtx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();

  // Master chain: masterGain → compressor → out
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -20;
  comp.ratio.value     = 4;
  comp.attack.value    = 0.005;
  comp.release.value   = 0.4;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0; // starts silent
  masterGain.connect(comp);
  comp.connect(audioCtx.destination);

  // Reverb send (wet mix = 25%)
  const rev     = buildReverb();
  const revGain = audioCtx.createGain();
  revGain.gain.value = 0.25;
  masterGain.connect(rev);
  rev.connect(revGain);
  revGain.connect(comp);

  soundReady = true;
}

// ── Called from onSignal for every human frame
function soundOnSignal(name, rssi, sId) {
  if (!soundReady || !soundEnabled) return;
  if (!isHuman(name)) return;

  const t    = audioCtx.currentTime;
  const freq = rssiToHz(rssi);
  const amp  = rssiToAmp(rssi);
  const pan  = SENSOR_PAN[sId] || 0;

  if (voices[name]) {
    // Voice exists — glide smoothly to new freq/amp
    const v = voices[name];
    v.osc.frequency.setTargetAtTime(freq, t, 1.8);   // slow glide = Nicolai
    v.gainNode.gain.setTargetAtTime(amp, t, 0.6);
    v.panNode.pan.setTargetAtTime(pan, t, 0.8);
    v.lastSeen = Date.now();
    v.rssi = rssi;
  } else {
    // New voice — birth with slow fade-in
    const osc      = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const panNode  = audioCtx.createStereoPanner();

    osc.type = 'sine';
    osc.frequency.value = freq;
    gainNode.gain.value = 0; // start silent
    panNode.pan.value   = pan;

    osc.connect(gainNode);
    gainNode.connect(panNode);
    panNode.connect(masterGain);
    osc.start(t);

    // Fade in over 1.5s — smooth arrival
    gainNode.gain.setTargetAtTime(amp, t, 1.5);

    voices[name] = { osc, gainNode, panNode, lastSeen: Date.now(), rssi };
  }
}

// ── Prune voices that haven't been seen in 8s — slow fade out
function pruneVoices() {
  if (!soundReady) return;
  const now = Date.now();
  Object.keys(voices).forEach(name => {
    const age = now - voices[name].lastSeen;
    if (age > 8000) {
      const v = voices[name];
      // Slow fade out — 3s decay, very Noto
      v.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 3.0);
      setTimeout(() => {
        try { v.osc.stop(); } catch(e) {}
      }, 12000);
      delete voices[name];
    }
  });
}

setInterval(pruneVoices, 1000);

// Sound toggle button — add to existing controls
(function() {
  const btn = document.createElement('button');
  btn.id = 'snd-btn';
  btn.textContent = 'SOUND OFF';
  btn.style.cssText = 'font-family:\'Courier New\',monospace;font-size:9px;letter-spacing:0.12em;padding:5px 12px;background:transparent;color:rgba(255,255,255,0.28);border:0.5px solid rgba(255,255,255,0.14);cursor:pointer;text-transform:uppercase;';
  btn.onmouseover = () => { btn.style.color='rgba(255,255,255,0.75)'; btn.style.borderColor='rgba(255,255,255,0.45)'; };
  btn.onmouseout  = () => {
    btn.style.color = soundEnabled ? '#fff' : 'rgba(255,255,255,0.28)';
    btn.style.borderColor = soundEnabled ? '#fff' : 'rgba(255,255,255,0.14)';
  };
  btn.onclick = () => {
    initAudio();
    soundEnabled = !soundEnabled;
    btn.textContent = soundEnabled ? 'SOUND ON' : 'SOUND OFF';
    btn.style.color = soundEnabled ? '#fff' : 'rgba(255,255,255,0.28)';
    btn.style.borderColor = soundEnabled ? '#fff' : 'rgba(255,255,255,0.14)';
    if (soundEnabled) {
      masterGain.gain.setTargetAtTime(0.65, audioCtx.currentTime, 0.5);
    } else {
      // Kill all — slow fade
      masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1.5);
      setTimeout(() => {
        Object.keys(voices).forEach(name => {
          try { voices[name].osc.stop(); } catch(e) {}
          delete voices[name];
        });
      }, 6000);
    }
  };
  document.getElementById('ctrls').prepend(btn);

  // White mode toggle
  let whiteMode = false;
  const wBtn = document.createElement('button');
  wBtn.textContent = 'BG: BLACK';
  wBtn.style.cssText = btn.style.cssText;
  wBtn.onclick = () => {
    whiteMode = !whiteMode;
    document.body.classList.toggle('white-mode', whiteMode);
    wBtn.textContent = whiteMode ? 'BG: WHITE' : 'BG: BLACK';
    wBtn.style.color = whiteMode ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.28)';
    // Update 3D renderers
    const bg = whiteMode ? 0xffffff : 0x000000;
    if (tRenderer)    tRenderer.setClearColor(bg, 1);
    if (e3Renderer)   e3Renderer.setClearColor(bg, 1);
    if (cityRenderer) cityRenderer.setClearColor(bg, 1);
    // Invert 3D renderer canvases
    const inv = whiteMode ? 'invert(1)' : 'none';
    if (tRenderer)    tRenderer.domElement.style.filter = inv;
    if (e3Renderer)   e3Renderer.domElement.style.filter = inv;
    if (cityRenderer) cityRenderer.domElement.style.filter = inv;
  };
  document.getElementById('ctrls').prepend(wBtn);
})();
</script>
